<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>貝殻アクセサリー | すずのとうだい</title>
  <style>
    :root { --main-color: #2832C3; }
    body { margin:0; font-family:sans-serif; }

    header {
      width: 100%; background: var(--main-color); color: #fff; position: relative; z-index: 1000;
    }
    .nav-container {
      max-width: 1200px; margin:auto; padding:10px 20px;
      display:flex; align-items:center; justify-content:space-between;
    }
    nav ul { list-style:none; display:flex; gap:25px; }
    nav a { color:white; text-decoration:none; }
    .dropdown { position:relative; }
    .dropdown-content {
      display:none; position:absolute; background:#fff; color:#000;
      top:30px; border-radius:6px; min-width:160px;
    }
    .dropdown-content a {
      display:block; padding:10px 15px; text-decoration:none; color:#000;
    }
    .dropdown.active .dropdown-content { display:block; }

    .hero {
      position: relative; width: 100%; height: 60vh; overflow: hidden;
    }
    .hero img {
      position: absolute; width: 100%; height: 100%; object-fit: cover;
      opacity: 0; transition: opacity 1.5s ease;
    }
    .hero img.active { opacity: 1; }

    .hero-text {
      position:absolute; top:50%; left:50%; transform:translate(-50%, -50%);
      color:white; text-shadow:0 2px 6px rgba(0,0,0,0.5); text-align:center;
    }
    .hero-text h1 { font-size:2.5rem; margin-bottom:10px; }

    .content {
      max-width:900px; margin:50px auto; padding:0 20px;
      line-height:1.8; font-size:1.1rem;
    }
  </style>
</head>

<body>

<header>
  <div class="nav-container">
    <div class="logo">すずのとうだい</div>
    <nav>
     <ul>
        <li><a href="index.html">ホーム</a></li>
        <li class="dropdown" id="dropdown">
          <a href="#" onclick="toggleDropdown(event)">活動内容 ▾</a>
          <div class="dropdown-content">
            <a href="silk.html">シルクスクリーン</a>
            <a href="science.html">科学教室</a>
            <a href="shell.html">貝殻アクセサリー</a>
            <a href="knitting.html">編み物</a>
          </div>
        </li>
        <li><a href="about.html">団体概要</a></li>
        <li><a href="#">お問い合わせ</a></li>
      </ul>
    </nav>
  </div>
</header>

<section class="hero">
  <img src="images/shell/1.jpg" class="slide active">
  <img src="images/shell/2.jpg" class="slide">
  <img src="images/shell/3.jpg" class="slide">

  <div class="hero-text">
    <h1>貝殻アクセサリー</h1>
    <p>海の素材を使ったオリジナルクラフト体験</p>
  </div>
</section>

<section class="content">
  <h2>貝殻アクセサリーとは？</h2>
  <p>
    海で拾った貝殻を磨き、色をつけ、金具を取り付けて
    世界にひとつだけのアクセサリーを作るワークショップです。
    子どもから大人まで、誰でも簡単に楽しめます。
  </p>
</section>

<script>
function toggleDropdown(e){ e.preventDefault();
  document.getElementById("dropdown").classList.toggle("active"); }

let index = 0;
const slides = document.querySelectorAll(".slide");
setInterval(() => {
  slides[index].classList.remove("active");
  index = (index + 1) % slides.length;
  slides[index].classList.add("active");
}, 5000);
</script>

</body>
</html>
